[[redirects]]
  from = "/thank-you"
  to = "/thank-you/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
  
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
  conditions = { method = ["GET", "HEAD"] }